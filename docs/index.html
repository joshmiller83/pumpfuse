<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PumpFuse Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; padding: 2rem 1rem; }
    h1 { font-size: 1.4rem; font-weight: 600; color: #94a3b8; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.25rem; }
    #updated { font-size: 0.8rem; color: #475569; margin-bottom: 2rem; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.25rem; margin-bottom: 2.5rem; }
    .card { background: #1e2330; border: 1px solid #2d3748; border-radius: 12px; padding: 1.5rem; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.25rem; }
    .card-name { font-size: 1.1rem; font-weight: 600; color: #e2e8f0; }
    .badge { font-size: 0.7rem; font-weight: 700; padding: 0.25rem 0.65rem; border-radius: 999px; letter-spacing: 0.06em; text-transform: uppercase; }
    .badge.running { background: #166534; color: #4ade80; }
    .badge.idle    { background: #1e293b; color: #64748b; }
    .badge.unknown { background: #1e293b; color: #64748b; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.2rem; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: #e2e8f0; }
    .stat-value.running { color: #4ade80; }
    .stat-unit { font-size: 0.75rem; color: #94a3b8; margin-left: 2px; }
    .last-change { margin-top: 1rem; font-size: 0.75rem; color: #475569; }
    h2 { font-size: 1rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; color: #475569; font-weight: 500; border-bottom: 1px solid #2d3748; }
    td { padding: 0.55rem 0.75rem; border-bottom: 1px solid #1a2035; color: #94a3b8; }
    tr:last-child td { border-bottom: none; }
    td.started { color: #4ade80; }
    td.stopped { color: #64748b; }
    .no-events { color: #475569; font-size: 0.85rem; padding: 1rem 0; }
    #error { background: #3b1212; border: 1px solid #7f1d1d; color: #fca5a5; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: none; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>PumpFuse</h1>
  <div id="updated">Loading…</div>
  <div id="error"></div>
  <div class="cards" id="cards"></div>
  <h2>Recent Events</h2>
  <div id="events"></div>

  <script>
    const DATA_URL = "data.json";
    const REFRESH_MS = 30000;

    function timeAgo(iso) {
      const s = Math.floor((Date.now() - new Date(iso)) / 1000);
      if (s < 60)  return `${s}s ago`;
      if (s < 3600) return `${Math.floor(s/60)}m ago`;
      if (s < 86400) return `${Math.floor(s/3600)}h ago`;
      return `${Math.floor(s/86400)}d ago`;
    }

    function fmt(iso) {
      const d = new Date(iso);
      return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
    }

    function renderCards(devices) {
      const el = document.getElementById("cards");
      el.innerHTML = Object.entries(devices).map(([key, d]) => {
        const running = d.running;
        const badge = running == null ? "unknown" : running ? "running" : "idle";
        const label = running == null ? "Unknown" : running ? "Running" : "Idle";
        const lastChange = d.last_change ? `Last change ${timeAgo(d.last_change)}` : "";
        return `
          <div class="card">
            <div class="card-header">
              <div class="card-name">${d.ap_name ?? key}</div>
              <span class="badge ${badge}">${label}</span>
            </div>
            <div class="stats">
              <div>
                <div class="stat-label">Power</div>
                <div class="stat-value ${running ? 'running' : ''}">${d.power ?? "—"}<span class="stat-unit">W</span></div>
              </div>
              <div>
                <div class="stat-label">Current</div>
                <div class="stat-value ${running ? 'running' : ''}">${d.amps ?? "—"}<span class="stat-unit">A</span></div>
              </div>
              <div>
                <div class="stat-label">Voltage</div>
                <div class="stat-value">${d.voltage ?? "—"}<span class="stat-unit">V</span></div>
              </div>
              <div>
                <div class="stat-label">State</div>
                <div class="stat-value">${d.state ?? "—"}</div>
              </div>
            </div>
            ${lastChange ? `<div class="last-change">${lastChange}</div>` : ""}
          </div>`;
      }).join("");
    }

    function renderEvents(events) {
      const el = document.getElementById("events");
      if (!events.length) {
        el.innerHTML = `<div class="no-events">No events recorded yet.</div>`;
        return;
      }
      el.innerHTML = `<table>
        <thead><tr><th>Time</th><th>Device</th><th>Event</th><th>Power</th><th>Amps</th><th>Voltage</th></tr></thead>
        <tbody>${events.map(e => {
          const cls = e.running ? "started" : "stopped";
          const label = e.running ? "Started" : "Stopped";
          return `<tr>
            <td>${fmt(e.timestamp)}</td>
            <td>${e.device}</td>
            <td class="${cls}">${label}</td>
            <td>${e.power}W</td>
            <td>${e.amps}A</td>
            <td>${e.voltage}V</td>
          </tr>`;
        }).join("")}</tbody>
      </table>`;
    }

    async function load() {
      try {
        const res = await fetch(`${DATA_URL}?_=${Date.now()}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        document.getElementById("error").style.display = "none";
        document.getElementById("updated").textContent = `Updated ${timeAgo(data.updated)} · ${fmt(data.updated)}`;
        renderCards(data.devices ?? {});
        renderEvents(data.recent_events ?? []);
      } catch (e) {
        document.getElementById("error").style.display = "block";
        document.getElementById("error").textContent = `Failed to load data: ${e.message}`;
      }
    }

    load();
    setInterval(load, REFRESH_MS);
  </script>
</body>
</html>
